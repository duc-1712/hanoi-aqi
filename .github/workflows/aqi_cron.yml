name: Tự động cập nhật AQI Liên Tục (20 Phút)

on:
  schedule:
    # Chạy mỗi 20 phút (vào phút 0, 20, 40) để dữ liệu dày hơn
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  run-cron-job:
    runs-on: ubuntu-latest
    # Thêm quyền ghi để Bot có thể tự Push code giữ Repo luôn "sống"
    permissions:
      contents: write

    steps:
      - name: Bước 1 - Kéo code xuống máy chủ
        uses: actions/checkout@v4

      - name: Bước 2 - Cài đặt Node.js 24 (Bản mới nhất, hết cảnh báo)
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Bước 3 - Cài đặt thư viện
        run: |
          cd backend
          npm install

      - name: Bước 4 - Chạy Bot cào dữ liệu
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AQICN_TOKEN: ${{ secrets.AQICN_TOKEN }}
        run: |
          cd backend
          # Thêm timeout 1 phút để tránh treo máy chủ ảo
          timeout 60s node run_cron.js || echo "Bot hoàn tất hoặc bị timeout nhẹ"

      - name: Bước 5 - CƠ CHẾ KEEP-ALIVE (Tự động cập nhật Repo)
        run: |
          # Thiết lập danh tính cho con Bot
          git config --global user.name "AQI-Bot-Automation"
          git config --global user.email "bot@github.com"

          # Ghi lại dấu vết chạy vào file nháp
          echo "Lần cập nhật cuối: $(date)" > backend/last_run.txt

          # Đẩy thay đổi lên GitHub để giữ Repo luôn ở trạng thái Active
          git add backend/last_run.txt
          git commit -m "Keep-alive: Dữ liệu AQI mới lúc $(date)" || echo "Không có thay đổi"
          git push
